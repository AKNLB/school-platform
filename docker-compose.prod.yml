services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_BASE=/api
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-school_platform}
      POSTGRES_USER: ${POSTGRES_USER:-school_platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://school_platform:change-me@postgres:5432/school_platform}
      - FLASK_APP=wsgi.py
      - COOKIE_SECURE=${COOKIE_SECURE:-0}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
    volumes:
      - backend_uploads:/app/uploads
      - backend_docs:/app/uploaded_docs
      - backend_resources:/app/uploaded_resources
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -lc "
        python -c 'import os,sys; print(\"DATABASE_URL=\"+os.getenv(\"DATABASE_URL\",\"\"))' &&
        flask db upgrade &&
        gunicorn -k eventlet -w 1 -b 0.0.0.0:8000 wsgi:app --timeout 120
      "

volumes:
  pg_data:
  backend_uploads:
  backend_docs:
  backend_resources:
