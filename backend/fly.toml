# fly.toml app configuration file generated for backend-lively-violet-8389 on 2026-01-25T18:11:35-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "backend-lively-violet-8389"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[mounts]
  source = "school_data"
  destination = "/data"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
